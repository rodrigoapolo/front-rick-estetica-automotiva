name: Build and Push Frontend

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push - Develop
        if: github.ref == 'refs/heads/develop'
        run: |
          docker build \
            --build-arg ENV_FILE="${{ secrets.ENV_FILE_DEVELOP }}" \
            -t rodrigoapolo/front-rick:develop \
            .
          docker push rodrigoapolo/front-rick:develop

      - name: Build e Push - Main
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            --build-arg ENV_FILE="${{ secrets.ENV_FILE_PRODUCTION }}" \
            -t rodrigoapolo/front-rick:latest \
            -t rodrigoapolo/front-rick:${{ github.sha }} \
            .
          docker push rodrigoapolo/front-rick:latest
          docker push rodrigoapolo/front-rick:${{ github.sha }}