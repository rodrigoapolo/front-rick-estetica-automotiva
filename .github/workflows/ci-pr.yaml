name: Frontend CI/CD

on:
  pull_request:
    branches: ["main", "develop"]
    types: ["opened", "synchronize"]

jobs:
  build-pr:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build